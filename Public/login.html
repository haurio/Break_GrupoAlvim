<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema Gestão Break – Grupo Alvim - Login" />
  <meta name="theme-color" content="#FF8233" />
  <title>Gestão Break - Login</title>
  <link rel="icon" type="image/x-icon" href="Images/Icon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="Images/Icon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>



  <!-- MAIN -->
  <main class="login-main">
    <div class="card login-card">
      <div class="login-logos">
        <img src="Images/BK-novo-logo.svg" alt="Burger King" class="logo-bk-login" />
        <span class="cross-divider">✕</span>
        <img src="Images/Logo_GA.png" alt="Grupo Alvim" class="logo-ga-login" />
      </div>

      <div class="hero login-hero">
        <h2>Gestão <span>Break</span></h2>
        <p>Introduza as suas credenciais para aceder</p>
      </div>

      <form action="/" class="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Utilizador</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <input type="text" id="username" name="username" class="input-field with-icon" placeholder="Insira o seu utilizador" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Palavra-passe</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="password" name="password" class="input-field with-icon with-eye" placeholder="Insira a sua palavra-passe" required />
            <button type="button" class="toggle-password" onclick="togglePassword()" title="Mostrar/Ocultar">
              <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg id="eye-closed" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </button>
          </div>
        </div>

        <button class="btn-submit login-btn" type="submit">
          Iniciar Sessão
        </button>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="login-footer">
    <p>&copy; 2026 <strong>GRUPO ALVIM – ALVIM PARTICIPAÇÕES E INVESTIMENTOS S/A</strong> · Todos os direitos reservados</p>
  </footer>

  <script src="js/login.js"></script>
</body>
<script>
  function togglePassword() {
    const pwd = document.getElementById('password');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      eyeOpen.style.display = 'none';
      eyeClosed.style.display = 'block';
    } else {
      pwd.type = 'password';
      eyeOpen.style.display = 'block';
      eyeClosed.style.display = 'none';
    }
  }
</script>
</html>
